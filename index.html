<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            margin: 20px;
        }
        nav a {
            color: #333;
            text-decoration: none;
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 5px;
            margin: 0 5px;
        }
        nav a:hover {
            background: #333;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .article, .photo, .video {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
        }
        @media (max-width: 600px) {
            nav {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website</h1>
        <nav>
            <a href="#articles">Articles</a>
            <a href="#photos">Photos</a>
            <a href="#videos">Videos</a>
        </nav>
    </header>
    <div class="container">
        <section id="articles">
            <h2>Articles</h2>
            <div class="article">
                <h3>Article Title 1</h3>
                <p>This is a summary of the first article. <a href="#">Read more...</a></p>
            </div>
            <div class="article">
                <h3>Article Title 2</h3>
                <p>This is a summary of the second article. <a href="#">Read more...</a></p>
            </div>
            <!-- Add more articles as needed -->
        </section>
        <section id="photos">
            <h2>Photos</h2>
            <div class="photo">
                <h3>Photo Title 1</h3>
                <img src="photo1.jpg" alt="Photo 1">
            </div>
            <div class="photo">
                <h3>Photo Title 2</h3>
                <img src="photo2.jpg" alt="Photo 2">
            </div>
            <!-- Add more photos as needed -->
        </section>
        <section id="videos">
            <h2>Videos</h2>
            <div class="video">
                <h3>Video Title 1</h3>
                <iframe src="https://www.youtube.com/embed/video1" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="video">
                <h3>Video Title 2</h3>
                <iframe src="https://www.youtube.com/embed/video2" frameborder="0" allowfullscreen></iframe>
            </div>
            <!-- Add more videos as needed -->
        </section>
    </div>
</body>
</html>
