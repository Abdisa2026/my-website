<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <ul>
                <li><a href="#articles">Manage Articles</a></li>
                <li><a href="#photos">Manage Photos</a></li>
                <li><a href="#videos">Manage Videos</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="articles">
            <h2>Manage Articles</h2>
            <button>Add New Article</button>
            <div class="article-list">
                <!-- Articles will be listed here -->
            </div>
        </section>
        <section id="photos">
            <h2>Manage Photos</h2>
            <button>Add New Photo</button>
            <div class="photo-list">
                <!-- Photos will be listed here -->
            </div>
        </section>
        <section id="videos">
            <h2>Manage Videos</h2>
            <button>Add New Video</button>
            <div class="video-list">
                <!-- Videos will be listed here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
